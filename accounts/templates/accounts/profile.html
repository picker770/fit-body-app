{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body text-center">
                <h3>{{ profile_user.username }}</h3>
                <p>Member since: {{ profile_user.date_joined|date }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>{{ profile_user.username }}</h4>
                <p>Member since: {{ profile_user.profile.bio|default:"No bio yet." }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
