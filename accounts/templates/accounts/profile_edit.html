{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-centre">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>Edit Profile</h3>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <h5>Account Info</h5>
                    {{ u_form.as_p }}
                    <hr>
                    <h5>Profile Info</h5>
                    {{ p_form.as_p }}
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a href="{% url 'accounts:profile' user.username %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
