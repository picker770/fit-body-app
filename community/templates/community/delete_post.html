{% extends 'base.html' %}

{% block title %} - Delete Post{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Delete Post</h3>
            </div>
            <div class="card-body">
                <p class="text-danger">Are you sure you want to delete this post?</p>
                <div class="card bg-light mb-3">
                    <div class="card-body">
                        <h5 class="mb-0">{{ post.title }}</h5>
                        <p class="text-muted mb-0">{{ post.caption|truncatechars:100 }}</p>
                    </div>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                        <a href="{% url 'community:post_detail' post.id %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
